<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #282C34;
    }
    #diagram {
      padding: 8px;
      overflow-x: auto;
    }
    #diagram svg {
      display: block;
    }
    #error {
      font-family: monospace;
      font-size: 12px;
      color: #e06c75;
      padding: 8px;
      display: none;
    }
  </style>
  <script src="mermaid.min.js"></script>
</head>
<body>
  <div id="diagram"></div>
  <pre id="error"></pre>
  <script>
    var _mermaidReady = false;
    var _pendingRender = null;

    function setBackground(color) {
      document.documentElement.style.background = color;
      document.body.style.background = color;
    }

    function _doRender(source, theme) {
      mermaid.initialize({
        startOnLoad: false,
        theme: theme,
        securityLevel: 'loose',
        flowchart: { useMaxWidth: true },
        sequence: { useMaxWidth: true },
        gantt:    { useMaxWidth: true },
      });

      var container = document.getElementById('diagram');
      var errorEl   = document.getElementById('error');
      errorEl.style.display = 'none';
      container.innerHTML = '';

      var id  = 'mermaid-' + Date.now();
      var div = document.createElement('div');
      div.id          = id;
      div.textContent = source;
      container.appendChild(div);

      mermaid.run({ nodes: [div] })
        .then(function() { reportHeight(); })
        .catch(function(err) {
          var msg = 'Error: ' + (err.message || String(err));
          errorEl.textContent = msg;
          errorEl.style.display = 'block';
          if (window.ErrorChannel) {
            ErrorChannel.postMessage(msg);
          }
          reportHeight();
        });
    }

    function renderDiagram(source, theme) {
      if (_mermaidReady) {
        _doRender(source, theme);
      } else {
        // Mermaid.js not ready yet — queue the render.
        _pendingRender = { source: source, theme: theme };
      }
    }

    // Poll for mermaid readiness (handles slow parse of 3.3 MB JS).
    function _waitForMermaid() {
      if (typeof mermaid !== 'undefined' && typeof mermaid.run === 'function') {
        _mermaidReady = true;
        if (window.ReadyChannel) {
          ReadyChannel.postMessage('ready');
        }
        if (_pendingRender) {
          var p = _pendingRender;
          _pendingRender = null;
          _doRender(p.source, p.theme);
        }
      } else {
        setTimeout(_waitForMermaid, 50);
      }
    }
    _waitForMermaid();

    function reportHeight() {
      // Two RAFs so the SVG is fully in the DOM before we read it.
      requestAnimationFrame(function() {
        requestAnimationFrame(function() {
          var svg = document.querySelector('#diagram svg');
          var h = 0;

          if (svg) {
            // viewBox is Mermaid's own layout result — totally independent of
            // viewport size, CSS overflow, and getBoundingClientRect.
            // Format: "minX minY width height"
            var vb = svg.getAttribute('viewBox');
            if (vb) {
              var parts = vb.trim().split(/[\s,]+/);
              if (parts.length >= 4) h = Math.ceil(parseFloat(parts[3]));
            }
            // Fallback: explicit height attribute (e.g. "278px" or "278")
            if (h <= 0) {
              var attr = svg.getAttribute('height') || '';
              h = Math.ceil(parseFloat(attr)) || 0;
            }
          }

          if (window.HeightChannel && h > 0) {
            HeightChannel.postMessage(String(h));
          }
        });
      });
    }
  </script>
</body>
</html>
