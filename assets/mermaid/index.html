<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #282C34;
      overflow: hidden;
      box-sizing: border-box;
    }
    #diagram {
      display: inline-block; /* shrink-wrap to SVG intrinsic width */
      min-width: 100%;
      padding: 8px;
      box-sizing: border-box;
    }
    #diagram svg {
      display: block;
    }
    #error {
      font-family: monospace;
      font-size: 12px;
      color: #e06c75;
      white-space: pre-wrap;
      word-break: break-all;
      padding: 8px;
      display: none;
    }
  </style>
  <script src="mermaid.min.js"></script>
</head>
<body>
  <div id="diagram"></div>
  <pre id="error"></pre>
  <script>
    function setBackground(color) {
      document.documentElement.style.background = color;
      document.body.style.background = color;
    }

    function renderDiagram(source, theme) {
      mermaid.initialize({
        startOnLoad: false,
        theme: theme,
        securityLevel: 'loose',
        // useMaxWidth:false → Mermaid outputs a fixed pixel-width SVG.
        // This makes rendering independent of the WebView viewport width,
        // fixing the squashed / tiny diagram on Android.
        flowchart: { useMaxWidth: false },
        sequence: { useMaxWidth: false },
        gantt: { useMaxWidth: false },
      });

      const container = document.getElementById('diagram');
      const errorEl = document.getElementById('error');
      errorEl.style.display = 'none';

      const id = 'mermaid-' + Date.now();
      container.innerHTML = '<div class="mermaid" id="' + id + '">' +
        source.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</div>';

      mermaid.run({ nodes: [document.getElementById(id)] })
        .then(() => reportHeight())
        .catch((err) => {
          errorEl.textContent = 'Render error: ' + (err.message || String(err));
          errorEl.style.display = 'block';
          reportHeight();
        });
    }

    function reportHeight() {
      // Double RAF so layout is fully committed before measuring.
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          // scrollHeight is independent of viewport size — reliable on Android.
          const h = Math.ceil(document.documentElement.scrollHeight);
          if (window.HeightChannel && h > 0) {
            window.HeightChannel.postMessage(String(h));
          }
        });
      });
    }
  </script>
</body>
</html>
