<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    html, body {
      margin: 0;
      padding: 8px;
      /* Background is set at runtime by setBackground() called from Dart
         before renderDiagram(), so it always matches the chat theme. */
      background: #282C34;
      overflow-x: auto;
      overflow-y: hidden;
      box-sizing: border-box;
    }
    #diagram {
      display: block;
      min-width: 0;
    }
    #diagram svg {
      max-width: 100%;
      height: auto;
    }
    #error {
      font-family: monospace;
      font-size: 12px;
      color: #e06c75;
      white-space: pre-wrap;
      word-break: break-all;
      display: none;
    }
  </style>
  <script src="mermaid.min.js"></script>
</head>
<body>
  <div id="diagram"></div>
  <pre id="error"></pre>
  <script>
    function setBackground(color) {
      document.documentElement.style.background = color;
      document.body.style.background = color;
    }

    function renderDiagram(source, theme) {
      mermaid.initialize({
        startOnLoad: false,
        theme: theme,
        securityLevel: 'loose',
        flowchart: { useMaxWidth: true },
        sequence: { useMaxWidth: true },
      });

      const container = document.getElementById('diagram');
      const errorEl = document.getElementById('error');
      errorEl.style.display = 'none';

      // Unique id required by mermaid
      const id = 'mermaid-' + Date.now();
      container.innerHTML = '<div class="mermaid" id="' + id + '">' +
        source.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</div>';

      mermaid.run({ nodes: [document.getElementById(id)] })
        .then(() => reportHeight())
        .catch((err) => {
          errorEl.textContent = 'Render error: ' + (err.message || String(err));
          errorEl.style.display = 'block';
          reportHeight();
        });
    }

    function reportHeight() {
      // Double RAF to ensure SVG layout is fully committed before measuring.
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          let h = 0;
          const svg = document.querySelector('#diagram svg');
          if (svg) {
            h = Math.ceil(svg.getBoundingClientRect().height);
          }
          if (h <= 0) {
            h = Math.ceil(document.documentElement.scrollHeight);
          }
          if (window.HeightChannel && h > 0) {
            window.HeightChannel.postMessage(String(h));
          }
        });
      });
    }
  </script>
</body>
</html>
