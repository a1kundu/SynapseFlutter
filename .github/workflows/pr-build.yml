name: PR Build (Release APK)

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get build metadata
        id: vars
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "build_number=$(git rev-list --count HEAD)" >> "$GITHUB_OUTPUT"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
          cache-dependency-path: android/*.gradle*

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: beta
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Prepare build
        id: changelog
        run: |
          # Stamp app version
          VERSION="${{ steps.vars.outputs.build_number }}.0.0-${{ steps.vars.outputs.sha_short }}"
          sed -i "s|APP_VERSION_PLACEHOLDER|${VERSION}|g" lib/version.dart

          # Decode keystore & create key.properties
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release-keystore.jks
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=release-keystore.jks
          EOF
          sed -i 's/^[[:space:]]*//' android/key.properties

          # Generate changelog — only commits within this PR's build history
          CH="pr${{ env.PR_NUMBER }}"
          PREV_TAG=$(git tag --list "v*-${CH}-*" --sort=-version:refname | head -n1)
          if [ -n "$PREV_TAG" ]; then
            echo "Previous ${CH} tag: $PREV_TAG"
            LOG=$(git log --pretty=format:"• %s (%h)" "${PREV_TAG}..HEAD" -- . ':!build')
          else
            echo "No previous ${CH} tag found – using PR commits only"
            LOG=$(git log --pretty=format:"• %s (%h)" "origin/${{ github.base_ref }}..HEAD" -- . ':!build')
          fi
          {
            echo "log<<CHANGELOG_EOF"
            echo "$LOG"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build Release APK (PR #${{ env.PR_NUMBER }})
        run: |
          VERSION="${{ steps.vars.outputs.build_number }}.0.0-${{ steps.vars.outputs.sha_short }}"
          BUILD_NUM="${{ steps.vars.outputs.build_number }}"
          flutter build apk --release \
            --build-name="$VERSION" --build-number="$BUILD_NUM" \
            --dart-define=PR_NUMBER=${{ env.PR_NUMBER }} \
            --no-pub \
            --target-platform android-arm64

      - name: Rename APK
        run: |
          VERSION="${{ steps.vars.outputs.build_number }}.0.0-${{ steps.vars.outputs.sha_short }}"
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/synapse-pr${{ env.PR_NUMBER }}-${VERSION}.apk

      - name: Create GitHub Pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.vars.outputs.build_number }}-pr${{ env.PR_NUMBER }}-${{ steps.vars.outputs.sha_short }}
          name: "Build #${{ steps.vars.outputs.build_number }} — Synapse PR#${{ env.PR_NUMBER }}"
          prerelease: true
          body: |
            **PR #${{ env.PR_NUMBER }}** release APK built from commit `${{ github.sha }}`
            Version: `${{ steps.vars.outputs.build_number }}.0.0-${{ steps.vars.outputs.sha_short }}` (code: ${{ steps.vars.outputs.build_number }})
            Branch: `${{ github.head_ref }}`
            PR: ${{ github.event.pull_request.html_url }}
            Triggered by: `${{ github.actor }}`

            ### Changelog
            ${{ steps.changelog.outputs.log }}
          files: build/app/outputs/flutter-apk/synapse-pr${{ env.PR_NUMBER }}-${{ steps.vars.outputs.build_number }}.0.0-${{ steps.vars.outputs.sha_short }}.apk
